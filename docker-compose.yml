services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-buyerreach}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-buyerreach}
      POSTGRES_DB: ${POSTGRES_DB:-buyerreach}
    ports:
      - "15432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: quay.io/minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-buyerreach}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-buyerreach-secret}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  backend:
    image: buyerreach-backend:latest
    restart: unless-stopped
    build:
      context: ./backend
    env_file:
      - ${APP_ENV_FILE:-.env.example}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "alembic upgrade head && exec uvicorn app.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)"]
      interval: 10s
      timeout: 3s
      start_period: 15s
      retries: 5

  celery-worker:
    image: buyerreach-backend:latest
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-.env.example}
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: celery -A app.tasks.celery_app worker --loglevel=INFO -Q buyerreach --concurrency=2 --prefetch-multiplier=1

  celery-enrichment-worker:
    image: buyerreach-backend:latest
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-.env.example}
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: celery -A app.tasks.celery_app worker --loglevel=INFO -Q industry_enrichment --concurrency=2 --prefetch-multiplier=1

  celery-beat:
    image: buyerreach-backend:latest
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-.env.example}
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: celery -A app.tasks.celery_app beat --loglevel=INFO

  email-verifier:
    build:
      context: ./services/email-verifier
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-.env.example}
    environment:
      REDIS_URL: redis://redis:6379/2
    expose:
      - "8080"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy

  n8n:
    image: n8nio/n8n:1.101.1
    restart: unless-stopped
    ports:
      - "15678:5678"
    environment:
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      DB_TYPE: sqlite
    volumes:
      - n8n-data:/home/node/.n8n

volumes:
  postgres-data:
  minio-data:
  n8n-data:
