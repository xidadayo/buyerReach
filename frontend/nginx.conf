server {
    listen 80;
    server_name _;

    # Docker service IPs can change whenever a container is recreated. Resolve
    # the backend through Docker DNS at request time instead of caching its IP
    # for the lifetime of the Nginx worker.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $backend_upstream http://backend:8000;

    root /usr/share/nginx/html;
    index index.html;

    location = /api/v1/ai/task-plans {
        proxy_pass $backend_upstream;
        proxy_connect_timeout 10s;
        proxy_send_timeout 200s;
        proxy_read_timeout 200s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /health {
        proxy_pass $backend_upstream;
        proxy_connect_timeout 3s;
        proxy_read_timeout 3s;
    }

    location = /ready {
        proxy_pass $backend_upstream;
        proxy_connect_timeout 3s;
        proxy_read_timeout 3s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
